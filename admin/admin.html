<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Locas del Aseo — Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#eef3f2;font-family:'Nunito Sans',sans-serif;color:#22333a;}
  h1{font-family:'Quicksand',sans-serif;font-size:20px;margin:0;}
  header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #dde7e5;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .sub{font-size:12.5px;color:#6b7c80;margin-top:2px;}
  .wrap{max-width:1100px;margin:0 auto;padding:16px 20px 100px;}
  input, select{font:inherit;border:1px solid #cddcda;border-radius:8px;padding:7px 9px;background:#fff;color:#22333a;}
  input:focus, select:focus{outline:2px solid #3ba784;outline-offset:1px;}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;}
  #buscar{width:100%;max-width:340px;padding:9px 12px;font-size:14px;}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0;}
  .btn-primario{background:#0f6e56;color:#fff;font-weight:700;padding:9px 16px;border-radius:10px;}
  .btn-primario:hover{background:#0b5945}
  .btn-secundario{background:#fff;color:#0f6e56;border:1.5px solid #0f6e56;font-weight:700;padding:8px 15px;border-radius:10px;}
  .conteo{font-size:13px;color:#4a5b5f;}
  .conteo b{color:#0f6e56}
  table{width:100%;border-collapse:separate;border-spacing:0 8px;}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:#6b7c80;padding:0 10px;font-weight:700;}
  tbody tr{background:#fff;}
  tbody td{padding:8px 10px;vertical-align:middle;border-top:1px solid #e4ece9;border-bottom:1px solid #e4ece9;}
  tbody td:first-child{border-left:1px solid #e4ece9;border-radius:12px 0 0 12px;}
  tbody td:last-child{border-right:1px solid #e4ece9;border-radius:0 12px 12px 0;}
  tr.sin-foto td:first-child{background:#fff7ec;}
  .foto-cel{width:64px;height:64px;border-radius:10px;background:#f1f5f4;position:relative;overflow:hidden;cursor:pointer;border:1.5px dashed #cddcda;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .foto-cel img{width:100%;height:100%;object-fit:contain;background:#fff;}
  .foto-cel .marca{font-size:9.5px;color:#8a9a97;text-align:center;line-height:1.2;padding:2px;}
  .foto-cel input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .nombre-in{width:100%;min-width:190px;font-weight:600;}
  .precio-in{width:100px;text-align:right;}
  .cat-in{min-width:140px;}
  .fila-acciones{display:flex;gap:6px;align-items:center;}
  .icon-btn{background:transparent;color:#8a3b3b;font-size:16px;padding:6px;border-radius:8px;}
  .icon-btn:hover{background:#fbeaea}
  .estado-foto{font-size:10.5px;margin-top:3px;color:#0f6e56;font-weight:700;min-height:13px;}
  .estado-foto.error{color:#a33636}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);opacity:0;background:#22333a;color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:all .25s ease;pointer-events:none;z-index:50;max-width:90vw;text-align:center;}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.error{background:#8a3b3b;}
  .barra-guardar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #dde7e5;padding:12px 20px;display:flex;justify-content:center;box-shadow:0 -6px 20px rgba(0,0,0,.05);}
  .barra-guardar .contenido{max-width:1100px;width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .cambios{font-size:12.5px;color:#a3691f;font-weight:700;}

  .tabs{display:flex;gap:6px;}
  .tab{background:#fff;color:#4a5b5f;border:1.5px solid #cddcda;font-weight:700;padding:8px 15px;border-radius:10px;font-size:13.5px;}
  .tab.activo{background:#0f6e56;color:#fff;border-color:#0f6e56;}

  .pkA{background:#fff;border:1px solid #e4ece9;border-radius:14px;padding:16px;margin-bottom:14px;}
  .pkA-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .emoji-in{width:52px;text-align:center;font-size:17px;flex:0 0 auto;}
  .pkA-top .nombre-in{flex:1;}
  .desc-in{width:100%;min-height:52px;font:inherit;border:1px solid #cddcda;border-radius:8px;padding:8px 10px;resize:vertical;background:#fff;color:#22333a;}
  .aviso-perdido{font-size:12px;color:#a3691f;background:#fff7ec;border:1px solid #f0dfc0;border-radius:8px;padding:7px 10px;margin-top:8px;}
  .pkA-resumen{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .conteo-pack{font-size:12.5px;color:#4a5b5f;}
  .conteo-pack b{color:#0f6e56}
  .btn-secundario.chico{padding:6px 12px;font-size:12.5px;}
  .picker{margin-top:12px;border-top:1px solid #e4ece9;padding-top:12px;}
  .buscar-picker{width:100%;max-width:100%;padding:8px 11px;font-size:13.5px;margin-bottom:8px;}
  .picker-lista{max-height:300px;overflow-y:auto;border:1px solid #e4ece9;border-radius:10px;}
  .picker-cat{font-size:11px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;color:#6b7c80;background:#f4f8f7;padding:6px 12px;position:sticky;top:0;}
  .picker-fila{display:flex;align-items:center;gap:10px;padding:7px 12px;border-top:1px solid #eef3f2;font-size:13.5px;}
  .picker-fila:hover{background:#f7fbfa;}
  .pf-check{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer;}
  .pf-check input{margin:0;flex:0 0 auto;}
  .pf-n{flex:1;min-width:0;}
  .pf-q{width:52px;text-align:center;padding:5px 4px;flex:0 0 auto;}
  .pf-q:disabled{opacity:.4;}
  .pf-p{color:#6b7c80;font-size:12.5px;flex:0 0 auto;min-width:52px;text-align:right;}
</style>
</head>
<body>
<header>
  <div>
    <h1>🫧 Locas del Aseo — Panel</h1>
    <div class="sub" id="subtitulo">Editar nombres, precios, categorías y fotos del catálogo</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
    <input id="buscar" placeholder="Buscar producto…">
    <div class="tabs">
      <button class="tab activo" id="tabProductos">Productos</button>
      <button class="tab" id="tabPacks">Packs</button>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="vistaProductos">
    <div class="toolbar">
      <button class="btn-secundario" id="agregar">+ Agregar producto</button>
      <span class="conteo" id="conteo"></span>
    </div>

    <table>
      <thead>
        <tr><th>Foto</th><th>Producto</th><th>Precio</th><th>Categoría</th><th></th></tr>
      </thead>
      <tbody id="filas"></tbody>
    </table>
  </div>

  <div id="vistaPacks" style="display:none">
    <div class="toolbar">
      <button class="btn-secundario" id="agregarPack">+ Agregar pack</button>
      <span class="conteo" id="conteoPacks"></span>
    </div>
    <div id="packsLista"></div>
  </div>
</div>

<div class="barra-guardar">
  <div class="contenido">
    <span class="cambios" id="cambios"></span>
    <button class="btn-primario" id="guardar">Guardar cambios</button>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";
let CATEGORIAS = [];
let FOTOS = new Set();
let filas = []; // {n,p,c}
let PACKS_ADM = []; // {e,n,d,items:[nombre,...]}
let sucio = false;
let vista = "productos";

const $ = s => document.querySelector(s);
const clp = n => "$" + (Number(n) || 0).toLocaleString("es-CL");
const slug = s => s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
                   .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");

function toast(msg, error) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = error ? "on error" : "on";
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.className = "", 2600);
}

function marcarSucio() {
  sucio = true;
  $("#cambios").textContent = "Tienes cambios sin guardar";
}

async function cargar() {
  const r = await fetch("/api/productos");
  const d = await r.json();
  CATEGORIAS = d.categorias;
  FOTOS = new Set(d.fotos);
  filas = d.productos.map(p => ({ ...p }));
  dibujar();
}

/* ═══════════ TABS ═══════════ */
function cambiarVista(v) {
  vista = v;
  $("#vistaProductos").style.display = v === "productos" ? "" : "none";
  $("#vistaPacks").style.display = v === "packs" ? "" : "none";
  $("#tabProductos").classList.toggle("activo", v === "productos");
  $("#tabPacks").classList.toggle("activo", v === "packs");
  $("#buscar").style.display = v === "productos" ? "" : "none";
  $("#subtitulo").textContent = v === "productos"
    ? "Editar nombres, precios, categorías y fotos del catálogo"
    : "Armar packs a mano: eligiendo qué productos incluye cada uno";
  if (v === "packs") dibujarPacks(); // refleja cambios de nombre/precio hechos en Productos
}
$("#tabProductos").addEventListener("click", () => cambiarVista("productos"));
$("#tabPacks").addEventListener("click", () => cambiarVista("packs"));

/* ═══════════ PACKS ═══════════ */
async function cargarPacks() {
  const r = await fetch("/api/packs");
  const d = await r.json();
  PACKS_ADM = (d.packs || []).map(pk => ({
    e: pk.e || "🧴", n: pk.n || "", d: pk.d || "",
    items: (pk.items || []).map(it => typeof it === "string" ? { n: it, q: 1 } : { n: it.n, q: Number(it.q) || 1 }),
  }));
  dibujarPacks();
}

function totalPack(pk) {
  return pk.items.reduce((s, it) => {
    const p = filas.find(x => x.n === it.n);
    return s + (p ? p.p * it.q : 0);
  }, 0);
}

function unidadesPack(pk) {
  return pk.items.reduce((s, it) => s + it.q, 0);
}

function dibujarPacks() {
  const cont = $("#packsLista");
  cont.innerHTML = "";
  PACKS_ADM.forEach((pk, i) => {
    const perdidos = pk.items.filter(it => !filas.some(p => p.n === it.n));
    const card = document.createElement("div");
    card.className = "pkA";
    card.innerHTML = `
      <div class="pkA-top">
        <input class="emoji-in" maxlength="4" value="${pk.e}" data-e="${i}" title="Emoji del pack">
        <input class="nombre-in" value="${pk.n}" placeholder="Nombre del pack" data-n="${i}">
        <button class="icon-btn" data-borrar-pack="${i}" title="Eliminar pack">🗑</button>
      </div>
      <textarea class="desc-in" placeholder="Descripción que ve el cliente al tocar el pack: qué incluye, para qué sirve" data-d="${i}">${pk.d}</textarea>
      ${perdidos.length ? `<div class="aviso-perdido">⚠ ${perdidos.length} producto(s) de este pack ya no están en el catálogo: ${perdidos.map(it => it.n).join(", ")}</div>` : ""}
      <div class="pkA-resumen">
        <span class="conteo-pack" data-conteo="${i}">${resumenPack(pk)}</span>
        <button class="btn-secundario chico" data-toggle-picker="${i}">Elegir productos y cantidades</button>
      </div>
      <div class="picker" data-picker="${i}" hidden>
        <input class="buscar-picker" placeholder="Buscar producto…" data-buscar="${i}">
        <div class="picker-lista" data-lista="${i}"></div>
      </div>`;
    cont.appendChild(card);
    dibujarPicker(i);
  });
  $("#conteoPacks").innerHTML = `<b>${PACKS_ADM.length}</b> pack${PACKS_ADM.length === 1 ? "" : "s"}`;
}

function resumenPack(pk) {
  const n = pk.items.length, u = unidadesPack(pk);
  return `<b>${n}</b> producto${n === 1 ? "" : "s"}${u !== n ? ` · <b>${u}</b> unidades` : ""} · <b>${clp(totalPack(pk))}</b>`;
}

function dibujarPicker(i) {
  const pk = PACKS_ADM[i];
  const cont = document.querySelector(`[data-lista="${i}"]`);
  const porCat = {};
  filas.forEach((p, idx) => { (porCat[p.c] ||= []).push({ p, idx }); });
  cont.innerHTML = Object.keys(porCat).sort().map(cat => `
      <div class="picker-cat">${cat}</div>
      ${porCat[cat].map(({ p, idx }) => {
        const item = pk.items.find(it => it.n === p.n);
        return `
        <div class="picker-fila">
          <label class="pf-check"><input type="checkbox" data-pick="${i}" data-idx="${idx}" ${item ? "checked" : ""}><span class="pf-n">${p.n}</span></label>
          <input type="number" class="pf-q" min="1" step="1" value="${item ? item.q : 1}" data-qty="${i}" data-idx="${idx}" ${item ? "" : "disabled"} title="Cantidad en el pack">
          <span class="pf-p">${clp(p.p)}</span>
        </div>`;
      }).join("")}`
  ).join("");
}

function filtrarPicker(i, q) {
  q = q.trim().toLowerCase();
  const cont = document.querySelector(`[data-lista="${i}"]`);
  cont.querySelectorAll(".picker-fila").forEach(fila => {
    const nombre = fila.querySelector(".pf-n").textContent.toLowerCase();
    fila.style.display = !q || nombre.includes(q) ? "" : "none";
  });
  cont.querySelectorAll(".picker-cat").forEach(catEl => {
    let el = catEl.nextElementSibling, visible = false;
    while (el && !el.classList.contains("picker-cat")) {
      if (el.style.display !== "none") visible = true;
      el = el.nextElementSibling;
    }
    catEl.style.display = visible ? "" : "none";
  });
}

$("#packsLista").addEventListener("input", e => {
  const iE = e.target.closest("[data-e]");
  if (iE) { PACKS_ADM[iE.dataset.e].e = iE.value; marcarSucio(); return; }
  const iN = e.target.closest("[data-n]");
  if (iN) { PACKS_ADM[iN.dataset.n].n = iN.value; marcarSucio(); return; }
  const iD = e.target.closest("[data-d]");
  if (iD) { PACKS_ADM[iD.dataset.d].d = iD.value; marcarSucio(); return; }
  const iB = e.target.closest("[data-buscar]");
  if (iB) { filtrarPicker(Number(iB.dataset.buscar), iB.value); return; }
});

function actualizaConteoPack(i) {
  const el = document.querySelector(`[data-conteo="${i}"]`);
  if (el) el.innerHTML = resumenPack(PACKS_ADM[i]);
}

$("#packsLista").addEventListener("change", e => {
  const chk = e.target.closest("[data-pick]");
  if (chk) {
    const i = Number(chk.dataset.pick);
    const p = filas[Number(chk.dataset.idx)];
    const pk = PACKS_ADM[i];
    const qtyInput = chk.closest(".picker-fila").querySelector(".pf-q");
    if (chk.checked) {
      const q = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      qtyInput.value = q;
      qtyInput.disabled = false;
      const existente = pk.items.find(it => it.n === p.n);
      if (existente) existente.q = q; else pk.items.push({ n: p.n, q });
    } else {
      qtyInput.disabled = true;
      pk.items = pk.items.filter(it => it.n !== p.n);
    }
    marcarSucio();
    actualizaConteoPack(i);
    return;
  }

  const qi = e.target.closest("[data-qty]");
  if (qi) {
    const i = Number(qi.dataset.qty);
    const p = filas[Number(qi.dataset.idx)];
    const pk = PACKS_ADM[i];
    const item = pk.items.find(it => it.n === p.n);
    if (!item) return;
    const q = Math.max(1, parseInt(qi.value, 10) || 1);
    qi.value = q;
    item.q = q;
    marcarSucio();
    actualizaConteoPack(i);
  }
});

$("#packsLista").addEventListener("click", e => {
  const tg = e.target.closest("[data-toggle-picker]");
  if (tg) {
    const picker = document.querySelector(`[data-picker="${tg.dataset.togglePicker}"]`);
    const abierto = !picker.hasAttribute("hidden");
    picker.toggleAttribute("hidden", abierto);
    tg.textContent = abierto ? "Elegir productos" : "Ocultar productos";
    return;
  }
  const bp = e.target.closest("[data-borrar-pack]");
  if (bp) {
    const i = Number(bp.dataset.borrarPack);
    if (confirm(`¿Eliminar el pack "${PACKS_ADM[i].n || "sin nombre"}"?`)) {
      PACKS_ADM.splice(i, 1);
      marcarSucio();
      dibujarPacks();
    }
  }
});

$("#agregarPack").addEventListener("click", () => {
  PACKS_ADM.unshift({ e: "🧴", n: "", d: "", items: [] });
  marcarSucio();
  dibujarPacks();
});

async function guardarPacks() {
  const sinNombre = PACKS_ADM.filter(pk => !pk.n.trim());
  if (sinNombre.length) {
    toast("Hay packs sin nombre — complétalos o elimínalos antes de guardar", true);
    return;
  }
  $("#guardar").disabled = true;
  $("#guardar").textContent = "Guardando…";
  try {
    const r = await fetch("/api/packs/guardar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ packs: PACKS_ADM }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || "error guardando");
    sucio = false;
    $("#cambios").textContent = "";
    toast(`Guardado: ${d.total} packs. Ya se ve reflejado en la web.`);
  } catch (err) {
    toast("No se pudo guardar: " + err.message, true);
  } finally {
    $("#guardar").disabled = false;
    $("#guardar").textContent = "Guardar cambios";
  }
}

function dibujar(filtro) {
  const q = (filtro || "").trim().toLowerCase();
  const tbody = $("#filas");
  tbody.innerHTML = "";
  let visibles = 0, sinFoto = 0;
  filas.forEach((p, i) => {
    const tieneFoto = FOTOS.has(slug(p.n));
    if (!tieneFoto) sinFoto++;
    if (q && !p.n.toLowerCase().includes(q)) return;
    visibles++;
    const tr = document.createElement("tr");
    tr.className = tieneFoto ? "" : "sin-foto";

    const tdFoto = document.createElement("td");
    tdFoto.innerHTML = `
      <div class="foto-cel" title="Click para subir/cambiar foto">
        ${tieneFoto
          ? `<img src="/assets/productos/${slug(p.n)}.jpg?ts=${Date.now()}" alt="">`
          : `<span class="marca">sin foto</span>`}
        <input type="file" accept="image/*" data-idx="${i}">
      </div>
      <div class="estado-foto" data-estado="${i}"></div>`;

    const tdNombre = document.createElement("td");
    const inNombre = document.createElement("input");
    inNombre.className = "nombre-in";
    inNombre.value = p.n;
    inNombre.addEventListener("input", () => { p.n = inNombre.value; marcarSucio(); });
    tdNombre.appendChild(inNombre);

    const tdPrecio = document.createElement("td");
    const inPrecio = document.createElement("input");
    inPrecio.className = "precio-in";
    inPrecio.type = "number";
    inPrecio.min = "0";
    inPrecio.step = "10";
    inPrecio.value = p.p;
    inPrecio.addEventListener("input", () => { p.p = Number(inPrecio.value) || 0; marcarSucio(); });
    tdPrecio.appendChild(inPrecio);

    const tdCat = document.createElement("td");
    const selCat = document.createElement("select");
    selCat.className = "cat-in";
    CATEGORIAS.forEach(c => {
      const op = document.createElement("option");
      op.value = c; op.textContent = c;
      if (c === p.c) op.selected = true;
      selCat.appendChild(op);
    });
    selCat.addEventListener("change", () => { p.c = selCat.value; marcarSucio(); });
    tdCat.appendChild(selCat);

    const tdAcc = document.createElement("td");
    tdAcc.innerHTML = `<div class="fila-acciones"><button class="icon-btn" data-borrar="${i}" title="Eliminar producto">🗑</button></div>`;

    tr.append(tdFoto, tdNombre, tdPrecio, tdCat, tdAcc);
    tbody.appendChild(tr);
  });
  $("#conteo").innerHTML = `<b>${filas.length}</b> productos · <b>${filas.length - sinFoto}</b> con foto · <b>${sinFoto}</b> sin foto`;
}

$("#filas").addEventListener("click", async e => {
  const btnBorrar = e.target.closest("[data-borrar]");
  if (btnBorrar) {
    const i = Number(btnBorrar.dataset.borrar);
    if (confirm(`¿Eliminar "${filas[i].n}" del catálogo?`)) {
      filas.splice(i, 1);
      marcarSucio();
      dibujar($("#buscar").value);
    }
  }
});

$("#filas").addEventListener("change", async e => {
  const input = e.target.closest('input[type=file]');
  if (!input || !input.files[0]) return;
  const i = Number(input.dataset.idx);
  const p = filas[i];
  const estado = document.querySelector(`[data-estado="${i}"]`);
  estado.textContent = "Subiendo…";
  estado.className = "estado-foto";
  try {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = rej;
      r.readAsDataURL(input.files[0]);
    });
    const r = await fetch("/api/foto", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nombre: p.n, imagen_base64: b64 }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || "error subiendo");
    FOTOS.add(slug(p.n));
    estado.textContent = "✓ Guardada";
    dibujar($("#buscar").value);
    toast(`Foto de "${p.n}" actualizada`);
  } catch (err) {
    estado.textContent = "Error al subir";
    estado.className = "estado-foto error";
    toast("No se pudo subir la foto: " + err.message, true);
  }
});

$("#buscar").addEventListener("input", () => dibujar($("#buscar").value));

$("#agregar").addEventListener("click", () => {
  filas.unshift({ n: "", p: 0, c: CATEGORIAS[0] });
  marcarSucio();
  $("#buscar").value = "";
  dibujar();
  const primerInput = document.querySelector("#filas tr td:nth-child(2) input");
  if (primerInput) primerInput.focus();
});

async function guardarProductos() {
  const invalidos = filas.filter(p => !p.n.trim());
  if (invalidos.length) {
    toast("Hay productos sin nombre — complétalos o elimínalos antes de guardar", true);
    return;
  }
  $("#guardar").disabled = true;
  $("#guardar").textContent = "Guardando…";
  try {
    const r = await fetch("/api/guardar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ productos: filas }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || "error guardando");
    sucio = false;
    $("#cambios").textContent = "";
    toast(`Guardado: ${d.total} productos. Ya se ve reflejado en el catálogo.`);
  } catch (err) {
    toast("No se pudo guardar: " + err.message, true);
  } finally {
    $("#guardar").disabled = false;
    $("#guardar").textContent = "Guardar cambios";
  }
}

$("#guardar").addEventListener("click", () => {
  if (vista === "packs") guardarPacks();
  else guardarProductos();
});

window.addEventListener("beforeunload", e => {
  if (sucio) { e.preventDefault(); e.returnValue = ""; }
});

cargar().then(cargarPacks);
</script>
</body>
</html>
